<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="row">
        {% for item in list %}
            <div class="col-4"><p>{{item.name}} {{item.surname}}</p></div>
            <div class="col-4"><p>{{item.email}}</p></div>
            <div class="col-4"><p>{{item.content}}</p></div>
        {% endfor %}
    </div>
</div>

</body>
</html>
